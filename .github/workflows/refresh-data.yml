name: Refresh Market Data

on:
  schedule:
    # 周一至周五 UTC 00:00，北京时间 08:00
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install akshare requests pandas numpy

      - name: Run data pipeline
        run: python3 pipeline/run_all.py

      - name: Commit and push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/
          if git diff --cached --quiet; then
            echo "No public/api changes to commit."
          else
            git commit -m "chore: auto-refresh data [skip ci]"
            git push
          fi
